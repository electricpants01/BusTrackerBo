name: Fetch Prices

on:
  schedule:
    # Every Monday 06:00 UTC (~02:00 Bolivia). Each run adds 7 new travel dates.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: node scripts/fetch-prices.mjs --sync-routes
      - run: node scripts/fetch-prices.mjs
        continue-on-error: true
      - run: node scripts/validate-prices.mjs

      - name: Commit price updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.txt
          git diff --staged --quiet || git commit -m "chore(data): weekly price update $(date -u +%Y-%m-%d)"
          git push
